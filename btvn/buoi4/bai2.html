<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>danh mục</title>
    <style>
        * {
            margin:10px;
            padding:10px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        .container {
            background-color: #f8f9fa;
            padding:50px 20px;
            text-align:center;
        }
        .category-section h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 30px;
        }
        .category-btn {
            display: inline-block; 
            padding: 12px 24px; 
            margin: 5px 10px; 
            
            background-color: #ffffff; 
            border: 1.5px solid #3498db; 
            border-radius: 6px; 
            
            color: #444; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: bold;
        }
         .category-btn:hover {
            background-color: #f0f8ff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Danh mục sản phẩm</h2>
        <div class="button-group">
            <a href="" class="category-btn">Laptop</a>
            <a href="" class="category-btn">Điện Thoại</a>
            <a href="" class="category-btn">Phụ Kiện Điện Tử</a>
            <a href="" class="category-btn">Máy Tính Bảng (Tablet)</a>
            <a href="" class="category-btn">Đồng Hồ Thông Minh</a>
        </div>
    </div>
</body>
</html>
