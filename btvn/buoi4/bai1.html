<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dăng ký khuyễn mãi</title>
    <style>
        * {
            margin:10px;
            padding:10px;
            text-align:justify;
        }
        .container {
            gap:20px;
            background-color: #f4f4f4;
            padding:20px;
            margin-bottom:30px;
            width:fit-content;
        }
        .box {
            width:400px;
            height:200px;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
        } 
        h3 {
            color:red;
        }
        span {
            color: gray;
        }
        button{
            background-color:blue;
        }
    </style>
</head>
<body>
    <div class="container">
         <div class="box">
            <h3>Đăng ký nhận khuyễn mãi!</h3>
            <span>Nhập email của bạn để không bỏ lỡ những deal"Siêu Sale Công Nghệ "mới nhất từ chúng tôi</span><br>
            <input type="email" id="email" value="Nhập địa chỉ email">
            <button>Đăng ký ngay</button>
         </div>
    </div>
</body>
</html>
