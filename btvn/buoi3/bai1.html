<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giày</title>
    <style>
      .product {
        background-color: white;
        border: 1px solid #e0e0e0;
        width:280px;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        padding:16px;
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
      }
      .img {
        width:100%;
        height:auto;
      }
      .name{
        font-size:18px;
        color: black;
        margin: 15px 0 10px;
      }
      .price {
        color:red;
        font-weight:bold;
        margin-top: 15px;
      }
      .buy{
        background-color: rgb(35, 254, 181);
        color:white;
        padding: 10px 20px;
        border:none;
      }
      .buy:hover{
        background-color:rgb(131, 247, 208)
      }
    </style>
</head>
<body>
    <div class="product">
        <img src="./img/giay.jpg" alt="Giày thể thao"><br>
        <div class="content">
            <h3 class="name">Giày Thể Thao Siêu Nhẹ</h3>
            <p class="price">1.250.000 VNĐ</p>
            <button class="buy">Mua ngay</button>
        </div>
        
    </div>
    
</body>
</html>
