<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Bảng Giá & Dark Mode</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>

<body>

    <div id="bai4"
        class="min-h-screen bg-gray-50 dark:bg-slate-900 transition-colors duration-300 flex flex-col items-center justify-center relative p-4">

        <button onclick="document.getElementById('bai4').classList.toggle('dark')"
            class="absolute bottom-8 right-8 bg-gray-200 hover:bg-gray-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-gray-800 dark:text-white px-5 py-2 rounded-full shadow-md text-sm font-bold transition">
            Đổi Giao Diện
        </button>

        <div
            class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-2xl shadow-xl p-8 text-center transition-colors duration-300">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white">Tour Đà Lạt</h3>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">3 Ngày 2 Đêm</p>

            <div class="text-2xl font-black text-blue-600 my-5">
                2.500.000đ <span class="text-xs font-normal text-gray-400">/khách</span>
            </div>

            <ul class="text-sm text-gray-600 dark:text-gray-300 space-y-3 mb-8 text-left w-max mx-auto">
                <li class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full"></span> Khách sạn 4 sao trung tâm
                </li>
                <li class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full"></span> Xe Limousine đưa đón tận nơi
                </li>
                <li class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full"></span> Vé tham quan tất cả các điểm
                </li>
            </ul>

            <button class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition">
                ĐẶT TOUR NGAY
            </button>
        </div>

    </div>

</body>

</html>
