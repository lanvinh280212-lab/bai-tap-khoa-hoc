<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ Đi Kèm</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10 font-sans">

    <div class="max-w-6xl mx-auto p-8 bg-gray-50 rounded-2xl">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">Dịch Vụ Đi Kèm</h2>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

            <div
                class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col items-start hover:shadow-md transition">
                <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded flex items-center justify-center mb-4">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                        </path>
                    </svg>
                </div>
                <h3 class="font-bold text-gray-800 text-sm mb-2">Khách Sạn</h3>
                <p class="text-xs text-gray-500 leading-relaxed">Hệ thống khách sạn chuẩn quốc tế cao cấp và tiện nghi.
                </p>
            </div>

            <div
                class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col items-start hover:shadow-md transition">
                <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded flex items-center justify-center mb-4">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                        </path>
                    </svg>
                </div>
                <h3 class="font-bold text-gray-800 text-sm mb-2">Vé Máy Bay</h3>
                <p class="text-xs text-gray-500 leading-relaxed">Đối tác từ các hãng hàng không hàng đầu thế giới.</p>
            </div>

            <div
                class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col items-start hover:shadow-md transition">
                <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded flex items-center justify-center mb-4">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                        </path>
                    </svg>
                </div>
                <h3 class="font-bold text-gray-800 text-sm mb-2">Bảo Hiểm</h3>
                <p class="text-xs text-gray-500 leading-relaxed">Đảm bảo an toàn 100% trong mọi tình huống khẩn cấp.</p>
            </div>

            <div
                class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col items-start hover:shadow-md transition">
                <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded flex items-center justify-center mb-4">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                        </path>
                    </svg>
                </div>
                <h3 class="font-bold text-gray-800 text-sm mb-2">Hướng Dẫn</h3>
                <p class="text-xs text-gray-500 leading-relaxed">Đội ngũ hướng dẫn viên người bản địa giàu kinh nghiệm.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
