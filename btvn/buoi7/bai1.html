<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 1 - Các Tour Nổi Bật</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

    <div class="max-w-5xl mx-auto p-4 bg-gray-50">
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-900">Các Tour Nổi Bật</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <img src="./img/anh1.jpg" alt="Thái Lan" class="w-full h-48 object-cover">
                <div class="p-4 text-center">
                    <h3 class="font-bold text-gray-800">Thái Lan</h3>
                    <p class="text-sm text-gray-500 mt-1">Xứ sở chùa vàng</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <img src="./img/anh2.jpg" alt="Nhật Bản" class="w-full h-48 object-cover">
                <div class="p-4 text-center">
                    <h3 class="font-bold text-gray-800">Nhật Bản</h3>
                    <p class="text-sm text-gray-500 mt-1">Hoa anh đào rực rỡ</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <img src="./img/anh3.jpg" alt="Pháp" class="w-full h-48 object-cover">
                <div class="p-4 text-center">
                    <h3 class="font-bold text-gray-800">Pháp</h3>
                    <p class="text-sm text-gray-500 mt-1">Kinh đô ánh sáng</p>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
