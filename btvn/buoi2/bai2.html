<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân</title>
</head>
<body>
    <h1>Hồ sơ thông tin cá nhân</h1><br>
    
    <form action="" nethod="get">
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <label for="name">Tên:</label>
            <input type="text" id="name" name="name" placeholder="Nhập họ và tên ...">
            <br>

            <label for="dob"> Ngày sinh:</label>
            <input type="date" id="dob" name="dob">
            
        </fieldset>
        <br>
        <fieldset>
            <legend>Thông tin liên hê</legend>
            <label for="email">Email:</label>
            <input type="text" id="email" name="email" placeholder="example@email.com"> 
            <br>

            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" placeholder="nhập số điện thoại">
        </fieldset>
        
        <label for="notes">Ghi chú bổ sung:</label><br>
        <textarea  name="notes" placeholder="Nhập ghi chú của bạn tại đây..."></textarea><br>

        <input type="submit" value="Lưu hồ sơ ">
    </form>
</body>
</html>
