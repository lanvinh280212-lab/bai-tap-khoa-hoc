<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo</title>
    <style>
        table,
        tr,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <h1>Báo Cáo Tài Chính Năm</h1>
    <table>
        <caption>Báo cáo doanh thu và lợi nhuận các quý trong năm </caption>
        <tr>
            <th>Chỉ tiêu</th>
            <th>Quý 1</th>
            <th>Quý 2</th>
            <th>Quý 3</th>
            <th>Quý 4</th>
        </tr>
        <tr>
            <th>Doanh thu (Tỷ VND)</th>
            <td>500</td>
            <td>650</td>
            <td>700</td>
            <td>850</td>
        </tr>
         <tr>
            <th>Lợi Nhuận(Tỷ VND)</th>
            <td>120</td>
            <td>180</td>
            <td>210</td>
            <td>250</td>
        </tr>
    </table>
</body>
</html>
