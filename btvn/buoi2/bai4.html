<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký vé</title>
</head>
<body>
    <h1>Đăng Ký Đặt vé Sự Kiện Âm Nhạc</h1>
    <form action="" method="get">
        <label for="fullname"> Họ và tên:</label>
        <input type="text" id="fullname" name="fullname"  required minlength="3" maxlength="50" placeholder="Nhập họ và tên ..."><br>

        <label for="ticker">Số lượng vé:</label>
        <input type="number" id="ticker" name="ticker"  min="1" max="5"><br>

        <label for="pass">Mã vé VIP(Đã cấp sẵn):</label>
        <input type="text" id="pass" name="pass" value="MUSIC-VIP-2026"><br>

        <label for="sale"> Mã vé giảm giá nội bộ:</label>
        <input type="text" id="sale" name="sale" value="NOT-ELIGIBLE" disabled><br>

        <button type="submit">Xác nhận đặt vé</button>
    </form>
</body>
</html>
