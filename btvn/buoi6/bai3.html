<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sách</title>
    <!-- Nhúng CSS của Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4">Danh Sách Sách Kèm Trạng Thái Xóa</h2>

        <!-- Bảng danh sách -->
        <table class="table table-striped table-bordered align-middle">
            <thead class="table-dark">
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Tên Sách</th>
                    <th scope="col">Tác Giả</th>
                    <th scope="col">Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th scope="row">1</th>
                    <td>Hành Trình Về Phương Đông</td>
                    <td>Baird T. Spalding</td>
                    <td>
                        <!-- Nút Xóa có gắn data-bs-toggle và data-bs-target để gọi Modal -->
                        <button type="button" class="btn btn-danger btn-sm" data-bs-toggle="modal"
                            data-bs-target="#confirmDeleteModal">
                            Xóa
                        </button>
                    </td>
                </tr>
                <tr>
                    <th scope="row">2</th>
                    <td>Đắc Nhân Tâm</td>
                    <td>Dale Carnegie</td>
                    <td>
                        <!-- Nút Xóa thứ 2 (gọi chung 1 Modal) -->
                        <button type="button" class="btn btn-danger btn-sm" data-bs-toggle="modal"
                            data-bs-target="#confirmDeleteModal">
                            Xóa
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Khối Modal Xác Nhận Xóa -->
    <!-- Class 'modal-dialog-centered' giúp căn giữa cửa sổ trên màn hình -->
    <div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-danger fw-bold" id="modalLabel">Xác nhận xóa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                </div>
                <div class="modal-body">
                    Bạn có chắc chắn muốn xóa cuốn sách này không? Hành động này không thể hoàn tác.
                </div>
                <div class="modal-footer">
                    <!-- Thuộc tính data-bs-dismiss="modal" dùng để đóng Modal -->
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-danger">Xác nhận</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Nhúng JS của Bootstrap 5 (BẮT BUỘC ĐỂ CÁC HIỆU ỨNG MODAL HOẠT ĐỘNG) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
