<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sự kiện Rikkei Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        :root {
            --rikkei-red: #A31525;
            --rikkei-black: #333333;
        }
        .btn-primary {
            --bs-btn-bg: var(--rikkei-red);
            --bs-btn-border-color: var(--rikkei-red);
            --bs-btn-hover-bg: #85101d;
            /* Màu khi hover chuột */
            --bs-btn-hover-border-color: #85101d;
            --bs-btn-active-bg: #85101d;
        }

        .btn-outline-secondary {
            --bs-btn-color: var(--rikkei-black);
            --bs-btn-border-color: #ced4da;
            --bs-btn-hover-bg: #f8f9fa;
            --bs-btn-hover-color: var(--rikkei-black);
        }
        .text-rikkei {
            color: var(--rikkei-red) !important;
        }
        .event-card {
            border: none;
            border-top: 4px solid var(--rikkei-red);
            /* Viền đỏ phía trên thẻ */
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            max-width: 900px;
        }
        .event-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 250px;
        }
    </style>
</head>

<body class="bg-light d-flex justify-content-center align-items-center min-vh-100 p-3">

    <div class="card event-card">
        <div class="row g-0">

            <div class="col-md-5">
                <img src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?q=80&w=800&auto=format&fit=crop"
                    class="event-img" alt="Sự kiện AI">
            </div>

            <div class="col-md-7">
                <div class="card-body p-4 p-lg-5">

                    <h3 class="card-title text-rikkei fw-bold mb-3">
                        Tech Talk: Tương Lai Lập Trình AI
                    </h3>

                    <p class="card-text text-muted mb-4">
                        Tham gia cùng Rikkei Academy để khám phá những xu hướng công nghệ AI mới nhất và cách ứng dụng
                        vào phát triển phần mềm trong tương lai.
                    </p>

                    <div class="mb-4">
                        <p class="mb-1"><strong class="text-dark">Thời gian:</strong> 09:00 - 12:00, 25/11/2026</p>
                        <p class="mb-0"><strong class="text-dark">Địa điểm:</strong> Cơ sở Rikkei Academy HN</p>
                    </div>

                    <div>
                        <button class="btn btn-primary px-4 py-2 me-2 fw-medium">Đăng Ký Ngay</button>
                        <button class="btn btn-outline-secondary px-4 py-2 fw-medium">Xem Chi Tiết</button>
                    </div>

                </div>
            </div>

        </div>
    </div>

</body>

</html>
