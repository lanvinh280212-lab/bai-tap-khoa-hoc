<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Sách mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow-sm" style="width: 500px; border-radius: 10px;">

        <h2 class="text-center mb-4">Thêm Sách Mới</h2>

        <form action="#">
            <div class="mb-3">
                <label for="name" class="form-label fw-bold fs-6">Tên sách</label>
                <input type="text" id="name" name="name" class="form-control form-control-lg"
                    placeholder="Nhập tên sách...">
            </div>

            <div class="mb-3">
                <label for="author" class="form-label fw-bold fs-6">Tác giả</label>
                <input type="text" id="author" name="author" class="form-control form-control-lg"
                    placeholder="Nhập tên tác giả...">
            </div>

            <div class="mb-4">
                <label for="category" class="form-label fw-bold fs-6">Thể loại</label>
                <select name="category" id="category" class="form-select form-select-lg">
                    <option value="">Chọn thể loại...</option>
                    <option value="thieu-nhi">Thiếu nhi</option>
                    <option value="co-tich">Cổ tích</option>
                    <option value="tieu-thuyet">Tiểu thuyết</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">Thêm sách</button>
        </form>

    </div>

</body>

</html>
