<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ảnh đẹp</title>
    <style>
        * { 
            margin:0;
            padding:0;
        }
        .project {
            border: 1px solid black;
            border-radius: 10px;
            box-shadow: inset;
            background-color: rgb(77, 76, 76);
        }
        img {
            width:300px;
            height:200px;
        }
        h2 {
            text-align: center;

        }
        .container {
            display:flex;
            align-content:space-around;
            gap:30px;
            flex-wrap: wrap;
            justify-content: space-between;
            height:600px;
        }
        .container img {
            width:32%;
            height:150px;
            object-fit: cover;
            border-radius: 4px;
        }
        @media (max-width:768px) {
            .project {
                max-width:450px;
            }
            .container {
                height:800px;
            }
            .container img {
                height:120px;
            }
        }
    </style>
</head>
<body>
    <div class="project">
        <h2>PHOTO GALLERY</h2>
        <div class="container">
            <div>
                <img src="./img/anh1.jpg" alt="ảnh 1">
                <img src="./img/anh2.jpg" alt="ảnh 2">
                <img src="./img/anh3.jpg" alt="ảnh 3">
                <img src="./img/anh4.jpg" alt="ảnh 4">
                <img src="./img/anh5.jpg" alt="ảnh 5">
                <img src="./img/anh6.jpg" alt="ảnh 6">
                <img src="./img/anh7.jpg" alt="ảnh 7">
                <img src="./img/anh8.jpg" alt="ảnh 8">
                <img src="./img/anh9.jpg" alt="ảnh 9">
            </div>
        </div>
    </div>
</body>
</html>
