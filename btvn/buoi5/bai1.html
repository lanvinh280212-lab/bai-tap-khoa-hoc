<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Giới thiệu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            border: 1px solid rgb(52, 52, 52);
            border-radius: 10px;
            min-height: 30vh;
            margin:0;
            display:flex;
            flex-direction: column;
        }
        main{
            flex:1;
        }
        footer {
            display: flex;
            font-size: 20px;
            justify-content: space-between;
            align-items: center;
            padding:0;    
            background-color: blue;
            text-align: center;
            color:white;
            padding:20px 40px;
            
        }

        .name {
            color: white;
        }

        .text {
            list-style-type: none;
            display: flex;
            gap: 10px;
        }

        a {
            text-decoration: none;
            color: white;
        }
    </style>
</head>

<body>
    <header>

    </header>
    <main>

    </main>
    <footer>
        <div class="name"> @2026 Bản quyền thuộc về </div>
        <ul class="text">
            <li><a href="">Facebook</a></li>
            <li><a href="">Twitter</a></li>
            <li><a href="">Linkedln</a></li>
            <li><a href="">Intagram</a></li>
        </ul>
    </footer>
</body>

</html>
