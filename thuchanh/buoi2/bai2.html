<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách</title>
    <style>
        table,
        tr,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <table>
        <caption>Danh sách nhân viên</caption>
        <thead>
            <tr>
                <th>STT</th>
                <th>Mã NV</th>
                <th>Họ tên</th>
                <th>Phòng ban</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>1</th>
                <td>NV001</td>
                <td>Nguyễn Văn A</td>
                <td>Hành chính</td>
            </tr>

            <tr>
                <th>2</th>
                <td>NV002</td>
                <td>Trần Thị B</td>
                <td>Kế toán</td>
            </tr>

            <tr>
                <th>3</th>
                <td>NV003</td>
                <td>Lê Văn C</td>
                <td>Kỹ thuật</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
