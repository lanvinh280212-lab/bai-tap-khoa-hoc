<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch công tác</title>
    <style>
        table,
        tr,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <h1>Lịch Công Tác Tuần</h1>
    <table>
        <caption>Lịch làm việc chi tiết từ Thứ 2 đến Thứ 6</caption>
        <thead>
            <tr>
                <th>Thời gian</th>
                <th>Thứ 2</th>
                <th>Thứ 3</th>
                <th>Thứ 4</th>
                <th>Thứ 5</th>
                <th>Thứ 6</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>Sáng</th>
                <td colspan="3" >Họp giao ban</td>
                <td rowspan="2">Khảo sát thực địa</td>
                <td>làm việc tại văn phòng</td>
            </tr>
            
            <tr>
                <th>Chiều</th>
                <td>Xử lý email</td>
                <td>Lên kế hoạch</td>
                <td>Hộp nhóm</td>
                <td>Báo cáo tuần</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
