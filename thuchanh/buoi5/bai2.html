<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lOGO</title>
    <style>
        * {
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        .container {
            margin:10px;
            padding:20px;
            flex-direction: column;
            border: 1px solid gray;
            width: 300px;
            height: 200px;
            text-align: center;
        }
        .logo {
           width: 100px;
           height: 100px;
           border-radius: 50%;
           object-fit: cover;
           justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <img  src="./img/anh (2).jpg" alt="ảnh đại diện" class="logo">
        <div class="text">
            <h2>Nguyễn Thị Lan</h2>
            <p><em>"Thái độ quyết định trình độ"</em></p>
        </div>
    </div>
</body>
</html>
