<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch vụ</title>
    <style>
        * {
            margin: 10px;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: large;
        }

        .menu {
            justify-content: justify;
            border: 1px solid gray;
            width: auto;
            height: auto;
            border-radius: 20px;
            box-shadow: 10px;
            background-color: rgb(244, 241, 241);

        }

        h2 {
            text-align: center;
        }

        .container {
            margin: 20px;
            display: flex;
            gap: 30px;
            flex-direction: row;
            flex-grow: 1;
            align-items: stretch;
            flex-wrap: wrap;
        }
        .text {
            margin:auto;
            border:1px solid black;
            border-radius: 10px;
            background-color: rgb(117, 117, 254);
            width:200px;
            height:50px;
            color:white;
        }
        h3 {
            text-align: center;
        }
        
    </style>
</head>

<body>
    <div class="menu">
        <h2>Dịch vụ của chúng tôi</h2>
        <div class="container">
            <div class="text">
                <h3>Web Design</h3>
            </div>
            <div class="text">
                <h3>SEO</h3>
            </div>
            <div class="text">
                <h3>Content</h3>
            </div> 
        </div>
    </div>
</body>

</html>
