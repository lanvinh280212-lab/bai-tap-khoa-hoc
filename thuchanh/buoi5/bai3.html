<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực đơn</title>
    <style>
        * {
            margin:10px;
            padding:0;
            box-sizing: border-box;
        }
        body {
           font-family: Arial, Helvetica, sans-serif;
           font-size: large;
        }
        .menu {
            justify-content: justify;
            border: 1px solid gray;
            width: auto;
            height: auto;
            border-radius: 20px;
            box-shadow: 10px;
            background-color: rgb(223, 222, 222);
            
        }
        h2 {
            text-align: center;
        }
        .container{
            margin:20px;
            display:flex;
            gap:30px;
            flex-direction: row;
            justify-content: space-around;
            align-items: stretch;
            flex-wrap: wrap;
        }
        img {
            display:block;
            width:100%;
            height:200px;
            margin:0;
            padding:0;

        }
        .food {
            margin:auto;
            border:1px solid black;
            border-radius: 20px;
            background-color: white;
            box-shadow: 0 0 20px rgb(181, 181, 181);
            width:300px;
            height:300px;
        }
        h3 {
            text-align: center;
        }
        p  {
            text-align: center;
            color:red;
        }
    </style>
</head>
<body>
    <div class="menu">
        <h2>Thực đơn của chúng tôi</h2>
        <div class="container">
            <div class="food">
                 <img src="./img/salad.jpg" alt="Salad Rau Củ Tươi">
                 <h3>Salad Rau Củ Tươi</h3>
                 <p>45.000 VNĐ</p>
            </div>
            <div class="food">
                <img src="./img/gao.jpg" alt="Salad Rau Củ Tươi">
                <h3>Cơm Gạo Lứt Bổ Dưỡng</h3>
                <p>75.000 VNĐ</p>
            </div>
            <div class="food">
                <img src="./img/pizza.jpg" alt="Salad Rau Củ Tươi">
                <h3>Pizza Hải sản Phô mai</h3>
                <p>120.000 VNĐ</p>
            </div>
            <div class="food">
                <img src="./img/hamburrger.jpg" alt="Salad Rau Củ Tươi">
                <h3>Hamburger Bò Úc</h3>
               <p>85.000 VNĐ</p>
            </div>
            <div class="food">
                <img src="./img/sườn.jpg" alt="Salad Rau Củ Tươi">
                <h3>Sườn Nướng BBQ</h3>
                <p>150.000 VNĐ</p>
            </div>
        </div>
    </div>
</body>
</html>
