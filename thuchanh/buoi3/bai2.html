<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khung thông tin tác giả</title>
    <style>
        .author-card {
        font-family: "Helvetica Neue", Arial, sans-serif; /* Cài đặt phông chữ ưu tiên và dự phòng */
        border: 1px solid #e2e8f0;
        padding: 20px;
        max-width: 450px;
        }

        .author-name {
        font-weight: 900; /* Nét chữ đậm nhất */
        font-size: 24px;
        margin-bottom: 10px;
        }

        .author-job {
        color: #64748b;
        font-weight: bold;
        margin-bottom: 15px;
        }

        .author-desc {
        line-height: 1.5; /* Khoảng cách giữa các dòng chuẩn 1.5 */
        color: #333;
        margin: 0;
        }
    </style>
</head>
<body>
    <div class="author-card">
        <div class="author-name">Vũ Văn A</div>
        <div class="author-job">Lập trình viên Fullstack</div>
        <p class="author-desc">Chào mừng bạn đến với blog của mình. Đây là nơi mình chia sẻ những kiến thức về HTML, CSS và
            các công nghệ lập trình hiện đại để cùng nhau phát triển trong hành trình trở thành lập trình viên chuyên
            nghiệp.</p>
    </div>
</body>
</html>
