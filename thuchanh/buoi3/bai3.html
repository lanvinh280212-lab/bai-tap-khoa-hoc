<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu vực</title>
    <style>
        .travel-hero {
        height: 450px;
        background-image: url('.img/xam.jpg');
        background-size: cover; /* Lấp đầy toàn bộ khu vực */
        background-repeat: no-repeat; /* Không lặp lại */
        background-position: center; /* Luôn nằm ở trung tâm */
        
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        }

        .hero-content {
        color: #ffffff; /* Chữ màu trắng sáng */
        max-width: 600px;
        padding: 20px;
        background-color: rgba(0, 0, 0, 0.4); /* Thêm lớp mờ nhẹ để chữ dễ đọc hơn trên nền ảnh */
        border-radius: 8px;
        }
    </style>
</head>
<body>
    <section class="travel-hero">
        <div class="hero-content">
            <h2>Khám Phá Vẻ Đẹp Thiên Nhiên</h2>
            <p>Đắm mình vào những cảnh quan hùng vĩ, tận hưởng không khí trong lành và tạo nên những kỷ niệm khó quên tại
                những điểm đến tuyệt vời nhất.</p>
        </div>
    </section>
</body>
</html>
