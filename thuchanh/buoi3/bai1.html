<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <style>
        .blog-header {
        width: 100%;
        padding: 60px 0; /* Chiều cao vừa phải */
        background-color: #1e293b; /* Sử dụng màu Hex */
        text-align: center; /* Căn giữa */
        }

        .blog-title {
        color: #ffffff; /* Chữ màu trắng */
        text-transform: uppercase; /* Tự động in hoa mà không cần gõ trong HTML */
        margin: 0;
        }
    </style>
</head>
<body>
    <header class="blog-header">
        <h1 class="blog-title">Xu hướng công nghệ 2026</h1>
    </header>
</body>
</html>
